# existing redirects
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/callback"
  to = "/.netlify/functions/auth-callback"
  status = 200

[[redirects]]
  from = "/api/gsc-data"
  to = "/.netlify/functions/gsc-data"
  status = 200

[[redirects]]
  from = "/api/db/get"
  to = "/.netlify/functions/db-get"
  status = 200

[[redirects]]
  from = "/api/db/save"
  to = "/.netlify/functions/db-save"
  status = 200

# new — approval system
[[redirects]]
  from = "/api/approvals"
  to = "/.netlify/functions/approvals"
  status = 200

[[redirects]]
  from = "/api/wordpress"
  to = "/.netlify/functions/wordpress"
  status = 200

[[redirects]]
  from = "/api/scheduler"
  to = "/.netlify/functions/scheduler"
  status = 200

[[redirects]]
  from = "/api/reviews"
  to = "/.netlify/functions/reviews"
  status = 200

# ── Function timeouts ──────────────────────────────────────────
# scheduler calls GSC + Claude in sequence — needs up to 3 mins
[functions."scheduler"]
  schedule = "0 6 * * 1"
  timeout = 180

# approvals handles Claude rewrites on rejection — needs headroom
[functions."approvals"]
  timeout = 60

# wordpress and reviews are pure API calls — 30s is fine but give margin
[functions."wordpress"]
  timeout = 30

[functions."reviews"]
  timeout = 60
