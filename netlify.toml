# Scheduled function: weekly autonomous SEO audit.
# Cron runs in UTC. Mondays 06:00 UTC = 10:00 Dubai time.
# Change/disable by editing this block. Requires a published deploy (won't
# run on deploy previews).
[functions."scheduler"]
  schedule = "0 6 * * 1"
