# Weekly cron — Monday 4:00am UTC = Monday 8:00am Dubai time (UTC+4)
# Runs before your 9am Monday review so all data is fresh
[functions."scheduler-background"]
  schedule = "0 4 * * 1"

[functions."competitor-matrix-background"]
  schedule = "0 4 * * 1"

# international-seo-background — Monday cron DISABLED (Shazin, 2026-06-26).
# The full pipeline (3 blogs/market + meta sweep + on-page across 9 markets)
# spends on the Anthropic API every Monday. Run it MANUALLY instead:
#   /.netlify/functions/international-seo-background?market=<key>&only=meta
#   (drop &only=meta for the full blog+meta+onpage run)
# Re-enable by uncommenting the schedule line below.
[functions."international-seo-background"]
  # schedule = "0 4 * * 1"

[functions."technical-seo-background"]
  schedule = "0 4 * * 1"

[functions."llm-mentions-background"]
  schedule = "0 4 * * 1"

[functions."backlinks-background"]
  schedule = "0 4 * * 1"

[functions."citations-background"]
  schedule = "0 4 * * 1"

[functions."ai-overview-background"]
  schedule = "0 4 * * 1"

[functions."keyword-discovery-background"]
  schedule = "0 4 * * 1"

# Weekly GBP + speed snapshots for monthly-report trend history — Mon 6am UTC (after the 4am jobs)
[functions."snapshots-background"]
  schedule = "0 6 * * 1"

# Closed-loop ranking attribution — measures whether shipped content moved rankings.
# 6am UTC Monday (after GSC cache refresh in the 4am jobs).
[functions."content-outcomes-background"]
  schedule = "0 6 * * 1"

# Daily Perch due date digest — 5am UTC = 9am Dubai
[functions."perch-notify-background"]
  schedule = "0 5 * * *"
